<h2>Movimientos</h2>

<a href="/inventario">Volver</a>

<table border="1">

<tr>
    <th>Producto</th>
    <th>Tipo</th>
    <th>Cantidad</th>
    <th>Proveedor</th>
    <th>Fecha</th>
</tr>

{% for m in movimientos %}

<tr>
    <td>{{ m.producto.nombre }}</td>
    <td>{{ m.tipo }}</td>
    <td>{{ m.cantidad }}</td>
    <td>
        {{ m.proveedor.nombre if m.proveedor else '' }}
    </td>
    <td>{{ m.fecha }}</td>
</tr>

{% endfor %}

</table>
