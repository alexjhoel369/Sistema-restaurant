<h2>CRUD Mesas</h2>

<a href="/dashboard">Volver</a>

<br><br>

<a href="/mesas/crear">
    Nueva Mesa
</a>

<br><br>

<table border="1">

<tr>
    <th>Número</th>
    <th>Capacidad</th>
    <th>Estado</th>
    <th>Acciones</th>
</tr>

{% for m in mesas %}

<tr>

    <td>{{ m.numero }}</td>
    <td>{{ m.capacidad }}</td>
    <td>{{ m.estado }}</td>

    <td>

        <a href="/mesas/editar/{{ m.id_mesa }}">
            Editar
        </a>

        |

        <a href="/mesas/eliminar/{{ m.id_mesa }}">
            Eliminar
        </a>

    </td>

</tr>

{% endfor %}

</table>
