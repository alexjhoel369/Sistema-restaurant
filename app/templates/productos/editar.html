<h2>Editar Producto</h2>

<form method="POST">
    Nombre: <input type="text" name="nombre" value="{{ producto.nombre }}"><br>
    Precio: <input type="number" step="0.01" name="precio" value="{{ producto.precio }}"><br>

    Categoría:
    <select name="id_categoria">
        {% for c in categorias %}
        <option value="{{ c.id_categoria }}" {% if c.id_categoria == producto.id_categoria %}selected{% endif %}>
            {{ c.nombre }}
        </option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Actualizar</button>
</form>

<a href="/productos">Volver</a>
