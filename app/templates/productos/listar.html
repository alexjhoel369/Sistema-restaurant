<h2>Productos</h2>

<a href="/dashboard">Volver</a> |
<a href="/productos/crear">Nuevo Producto</a>

<table border="1">
    <tr>
        <th>Nombre</th>
        <th>Precio</th>
        <th>Categoría</th>
        <th>Acciones</th>
    </tr>

    {% for p in productos %}
    <tr>
        <td>{{ p.nombre }}</td>
        <td>{{ p.precio }}</td>
        <td>{{ p.categoria.nombre if p.categoria else '' }}</td>
        <td>
            <a href="/productos/editar/{{ p.id_producto }}">Editar</a>
            <a href="/productos/eliminar/{{ p.id_producto }}">Eliminar</a>
        </td>
    </tr>
    {% endfor %}
</table>
