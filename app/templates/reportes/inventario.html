<h2>Reporte Inventario</h2>

<a href="/reportes">Volver</a>

<table border="1">

<tr>
    <th>Producto</th>
    <th>Stock</th>
    <th>Mínimo</th>
</tr>

{% for i in inventarios %}

<tr>

    <td>{{ i.producto.nombre }}</td>
    <td>{{ i.stock_actual }}</td>
    <td>{{ i.stock_minimo }}</td>

</tr>

{% endfor %}

</table>
