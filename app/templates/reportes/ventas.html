<h2>Reporte de Ventas</h2>

<a href="/reportes">Volver</a>

<h3>
    Total vendido:
    {{ total_ventas }}
</h3>

<table border="1">

<tr>
    <th>ID</th>
    <th>Fecha</th>
    <th>Total</th>
</tr>

{% for f in facturas %}

<tr>
    <td>{{ f.id_factura }}</td>
    <td>{{ f.fecha }}</td>
    <td>{{ f.total }}</td>
</tr>

{% endfor %}

</table>
